<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BRAAND School Plus v1.0.6</title>
<!-- v1.0.6 - Added Interactive Kanban Board -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=JetBrains+Mono:wght@300;400;500;600&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
/* ══════════════════════════ TOKENS ══════════════════════════ */
:root{
  --bg:#080808; --s1:#0f0f0f; --s2:#161616; --s3:#1d1d1d; --s4:#242424;
  --border:#282828; --border2:#333; --border3:#404040;
  --lime:#C8FF00; --lime2:#aad900; --lime-a10:rgba(200,255,0,.10); --lime-a18:rgba(200,255,0,.18);
  --text:#efefef; --t2:#a8a8a8; --t3:#666; --t4:#3d3d3d;
  --red:#ff4455; --red-a:#ff445520; --orange:#ff9500; --orange-a:#ff950018;
  --blue:#4d9fff; --blue-a:#4d9fff18; --green:#00d97e; --green-a:#00d97e18;
  --purple:#b088ff; --purple-a:#b088ff18;
  --font-h:'Syne',sans-serif; --font-b:'DM Sans',sans-serif; --font-m:'JetBrains Mono',monospace;
  --r:8px; --rl:12px; --rx:18px; --sh:0 4px 24px rgba(0,0,0,.6);
}
/* ══════════════════════════ LIGHT MODE ══════════════════════ */
body.light{
  --bg:#f0f2f5; --s1:#ffffff; --s2:#f6f7f9; --s3:#eceef2; --s4:#e4e7ec;
  --border:#e2e5ea; --border2:#d4d8df; --border3:#bec3cc;
  --lime:#5c8500; --lime2:#4d7000; --lime-a10:rgba(92,133,0,.08); --lime-a18:rgba(92,133,0,.14);
  --text:#111827; --t2:#4b5563; --t3:#9ca3af; --t4:#d1d5db;
  --red:#dc2626; --red-a:rgba(220,38,38,.08);
  --orange:#ea580c; --orange-a:rgba(234,88,12,.08);
  --blue:#2563eb; --blue-a:rgba(37,99,235,.08);
  --green:#16a34a; --green-a:rgba(22,163,74,.08);
  --purple:#7c3aed; --purple-a:rgba(124,58,237,.08);
  --sh:0 2px 12px rgba(0,0,0,.08);
}
body.light ::-webkit-scrollbar-thumb{background:var(--border3)}
body.light .sb{box-shadow:2px 0 8px rgba(0,0,0,.06)}
body.light .topbar{box-shadow:0 1px 4px rgba(0,0,0,.06)}
body.light .mover{background:rgba(0,0,0,.4)}
body.light .mbox{box-shadow:0 20px 60px rgba(0,0,0,.15)}
body.light .dt tbody tr:hover{background:var(--s3)}
body.light .btn-g{color:var(--t2);border-color:var(--border2)}
body.light .btn-g:hover{border-color:var(--lime);color:var(--lime)}
body.light .toast{box-shadow:0 4px 16px rgba(0,0,0,.12)}
body.light .ticker-item{color:var(--lime)}
body.light .ticker-tag{background:rgba(92,133,0,.12);color:var(--lime)}
body.light input::placeholder,body.light textarea::placeholder{color:var(--t3)}
body.light .nav-i:hover{background:var(--s3)}
body.light .nav-i.on{background:rgba(92,133,0,.1)}
body.light .auth-h{color:var(--text)}
body.light .auth-sub{color:var(--t2)}
body.light #auth-screen::before{background:radial-gradient(ellipse 70% 40% at 50% -5%,rgba(92,133,0,.08),transparent)}
body.light #auth-screen::after{color:var(--t4)}
/* form elements in light */
body.light .fg input,body.light .fg select,body.light .fg textarea,body.light .si,body.light .tb-search,body.light .fld input{background:var(--s2);border-color:var(--border2);color:var(--text)}
body.light .fg select option{background:#fff;color:#111}
body.light .fg input:focus,body.light .fg select:focus,body.light .fg textarea:focus,body.light .si:focus,body.light .fld input:focus{border-color:var(--lime)}
/* cards/surfaces */
body.light .stat.hi{background:rgba(92,133,0,.07);border-color:rgba(92,133,0,.25)}
body.light .bic{background:var(--s2);border-color:var(--border2);color:var(--t2)}
body.light .bic:hover{border-color:var(--lime);color:var(--lime)}
body.light .ib{background:var(--s2);border-color:var(--border2);color:var(--t2)}
body.light .ib:hover{border-color:var(--lime);color:var(--lime)}
body.light .pb{background:var(--s2);border-color:var(--border2);color:var(--text)}
body.light .pb:hover,body.light .pb.on{background:var(--lime);border-color:var(--lime);color:#fff}
body.light .tog{background:var(--border2)}
body.light .tog.on{background:var(--lime)}
body.light .tabs{border-color:var(--border)}
body.light .tab{color:var(--t3)}
body.light .tab.on{color:var(--lime);border-bottom-color:var(--lime)}
body.light .tab:hover{color:var(--text)}
body.light .tcard{background:var(--s2);border-color:var(--border)}
body.light .tcard:hover{border-color:var(--border3)}
body.light .msg-b.sent{background:rgba(92,133,0,.12);border-color:rgba(92,133,0,.2)}
body.light .msg-b.recv{background:var(--s2);border-color:var(--border)}
body.light .chat-input{background:var(--s2);border-color:var(--border2);color:var(--text)}
body.light .chat-input:focus{border-color:var(--lime)}
body.light .conv-i:hover,body.light .conv-i.on{background:var(--s3)}
body.light .mon-card{background:var(--s2);border-color:var(--border)}
body.light .mon-card.online{border-color:rgba(22,163,74,.35)}
body.light .mon-card.break{border-color:rgba(234,88,12,.35)}

body.light .progress-fill{background:var(--lime)}
body.light .req-card{background:var(--s2);border-color:rgba(92,133,0,.2)}
body.light .notice-preview-ticker{background:rgba(0,0,0,.04) !important}
/* badge adjustments for light */
body.light .bl{background:rgba(92,133,0,.12);color:var(--lime);border-color:rgba(92,133,0,.25)}
body.light .bk{background:rgba(0,0,0,.06);color:var(--t2);border-color:var(--border2)}
body.light .ni-badge{background:var(--red)}
body.light .conv-unrd{background:var(--lime);color:#000}
body.light .logout-btn:hover{color:var(--red)}
body.light .sb-urole{color:var(--lime)}
/* clock widget */
body.light .clock-wgt{background:var(--s1);border-color:var(--border)}
body.light .ctime{color:var(--lime)}
body.light .cstatus{border-color:var(--border2)}
/* scroll bar */
body.light ::-webkit-scrollbar-thumb{background:var(--border3)}

.sb,.main,.topbar,.card,.stat,.mbox,.dt th,.dt td,.tcard,.clock-wgt,.msg-b,.chat-area,.conv-list,.conv-i,.mon-card,.req-card,.tb-search,.ib,.bic,.tog,.tabs,.tab,.fg input,.fg select,.fg textarea,.si,.chat-input,.fld input{transition:background .2s,border-color .2s,color .2s,box-shadow .2s}

/* Theme toggle */
.theme-tog{width:36px;height:20px;border-radius:10px;background:var(--border2);border:none;cursor:pointer;position:relative;transition:background .2s;flex-shrink:0;display:flex;align-items:center;justify-content:center}
body.light .theme-tog{background:var(--lime)}
.theme-tog::before{content:'🌙';font-size:10px;position:absolute;left:3px;transition:opacity .2s}
.theme-tog::after{content:'☀️';font-size:10px;position:absolute;right:3px;transition:opacity .2s;opacity:0}
body.light .theme-tog::before{opacity:0}
body.light .theme-tog::after{opacity:1}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:14px}
body{font-family:var(--font-b);background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;transition:background .2s,color .2s}
input,select,textarea,button{font-family:var(--font-b);font-size:14px;color:inherit}
a{color:inherit;text-decoration:none}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border3);border-radius:2px}

/* ══════════════════════════ AUTH ════════════════════════════ */
#auth-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--bg);position:relative}
#auth-screen::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 70% 40% at 50% -5%,rgba(200,255,0,.06),transparent)}
#auth-screen::after{content:'BRAAND SCHOOL +';position:absolute;bottom:32px;left:50%;transform:translateX(-50%);font-family:var(--font-m);font-size:10px;color:var(--t4);letter-spacing:3px}
.auth-wrap{width:100%;max-width:400px;padding:20px;z-index:1}
.auth-mark{font-family:var(--font-h);font-size:13px;font-weight:800;color:var(--lime);letter-spacing:1px;margin-bottom:4px;font-variant:small-caps}
.auth-tagline{font-family:var(--font-m);font-size:10px;color:var(--t4);letter-spacing:2px;margin-bottom:40px;text-transform:uppercase}
.auth-h{font-family:var(--font-h);font-size:30px;font-weight:800;line-height:1.1;margin-bottom:6px;letter-spacing:-.5px}
.auth-sub{font-size:13px;color:var(--t2);margin-bottom:28px}
.fld{margin-bottom:14px}
.fld label{display:block;font-family:var(--font-m);font-size:10px;color:var(--t3);letter-spacing:1px;text-transform:uppercase;margin-bottom:7px}
.fld input{width:100%;background:var(--s2);border:1px solid var(--border2);border-radius:var(--r);padding:12px 14px;color:var(--text);outline:none;transition:border-color .15s}
.fld input:focus{border-color:var(--lime)}
.auth-btn{width:100%;padding:14px;background:var(--lime);color:#000;font-family:var(--font-h);font-size:14px;font-weight:700;border:none;border-radius:var(--r);cursor:pointer;margin-top:6px;letter-spacing:.5px;transition:all .15s}
.auth-btn:hover{background:var(--lime2);transform:translateY(-1px)}
.auth-btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
.auth-err{background:var(--red-a);border:1px solid rgba(255,68,85,.3);border-radius:var(--r);padding:10px 14px;font-size:12px;color:var(--red);margin-bottom:14px;display:none}

/* ══════════════════════════ SHELL ═══════════════════════════ */
#app{display:none;height:100vh;overflow:hidden}
.shell{display:flex;height:100vh}

/* ══════════════════════════ SIDEBAR ════════════════════════ */
.sb{width:220px;background:var(--s1);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;transition:width .2s;overflow:hidden;z-index:100}
.sb.mini{width:54px}
.sb-top{padding:16px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;min-height:58px}
.sb-logo{font-family:var(--font-h);font-size:14px;font-weight:800;color:var(--lime);white-space:nowrap;flex:1;overflow:hidden}
.sb-tog{background:none;border:none;color:var(--t3);cursor:pointer;font-size:16px;flex-shrink:0;padding:4px;border-radius:4px;transition:color .15s;display:flex;align-items:center;justify-content:center;width:24px;height:24px}
.sb-tog:hover{color:var(--text)}
.sb-user{padding:12px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;min-height:54px;overflow:hidden}
.sb-av{width:30px;height:30px;border-radius:50%;background:var(--lime-a10);border:1.5px solid rgba(200,255,0,.4);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-family:var(--font-h);font-size:12px;font-weight:700;color:var(--lime);overflow:hidden}
.sb-av img{width:100%;height:100%;object-fit:cover}
.sb-uinfo{overflow:hidden;white-space:nowrap}
.sb-uname{font-size:12px;font-weight:600;overflow:hidden;text-overflow:ellipsis}
.sb-urole{font-family:var(--font-m);font-size:10px;color:var(--lime);text-transform:uppercase;letter-spacing:.5px}
.sb-nav{flex:1;overflow-y:auto;padding:6px 0}
.sb-sec{padding:10px 14px 3px;font-family:var(--font-m);font-size:9px;color:var(--t4);letter-spacing:1.5px;text-transform:uppercase;white-space:nowrap;overflow:hidden}
.sb.mini .sb-sec{opacity:0;pointer-events:none}
.sb.mini .sb-logo{display:none}
.sb.mini .sb-uinfo{display:none}
.nav-i{display:flex;align-items:center;padding:8px 14px;gap:10px;cursor:pointer;transition:all .15s;position:relative;white-space:nowrap;overflow:hidden;border-radius:0}
.nav-i:hover{background:var(--s2)}
.nav-i.on{background:var(--lime-a10);color:var(--lime)}
.nav-i.on::before{content:'';position:absolute;left:0;top:6px;bottom:6px;width:2px;background:var(--lime);border-radius:0 2px 2px 0}
.ni-icon{font-size:15px;flex-shrink:0;width:22px;display:flex;align-items:center;justify-content:center}
.ni-lbl{font-size:12.5px;font-weight:500;overflow:hidden;text-overflow:ellipsis}
.ni-badge{margin-left:auto;background:var(--red);color:#fff;font-size:9px;font-weight:700;border-radius:8px;padding:1px 5px;font-family:var(--font-m);flex-shrink:0}
.sb-bot{padding:10px 14px;border-top:1px solid var(--border)}
.logout-btn{display:flex;align-items:center;gap:10px;padding:7px;cursor:pointer;color:var(--t2);font-size:12px;border:none;background:none;width:100%;border-radius:var(--r);transition:color .15s}
.logout-btn:hover{color:var(--red)}

/* ══════════════════════════ MAIN ════════════════════════════ */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.topbar{height:54px;background:var(--s1);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:12px;flex-shrink:0}
.tb-title{font-family:var(--font-h);font-size:15px;font-weight:700;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tb-search{display:flex;align-items:center;background:var(--s2);border:1px solid var(--border);border-radius:var(--r);padding:6px 11px;gap:7px;max-width:240px;flex:1}
.tb-search input{background:none;border:none;outline:none;color:var(--text);font-size:12px;width:100%}
.tb-search input::placeholder{color:var(--t4)}
.tb-acts{display:flex;align-items:center;gap:6px}
.ib{width:32px;height:32px;border-radius:var(--r);background:var(--s2);border:1px solid var(--border);color:var(--t2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;transition:all .15s;position:relative}
.ib:hover{border-color:var(--lime);color:var(--lime)}
.ib .dot{position:absolute;top:5px;right:5px;width:6px;height:6px;background:var(--red);border-radius:50%;border:1px solid var(--s1)}

/* ══════════════════ NOTICE TICKER (employee) ════════════════ */
.ticker-bar{background:var(--lime-a10);border-bottom:1px solid rgba(200,255,0,.2);padding:6px 0;overflow:hidden;flex-shrink:0;display:none}
.ticker-bar.visible{display:block}
.ticker-inner{display:flex;align-items:center;gap:0;white-space:nowrap;animation:ticker 35s linear infinite}
.ticker-inner:hover{animation-play-state:paused}
@keyframes ticker{from{transform:translateX(0)}to{transform:translateX(-50%)}}
.ticker-item{font-size:11.5px;font-weight:600;color:var(--lime);padding:0 32px;display:inline-flex;align-items:center;gap:8px}
.ticker-item::before{content:'◆';font-size:7px;opacity:.6}
.ticker-tag{font-family:var(--font-m);font-size:9px;background:rgba(200,255,0,.2);padding:1px 6px;border-radius:4px;color:var(--lime);letter-spacing:.5px}

/* ══════════════════════════ CONTENT ═════════════════════════ */
.pg-wrap{flex:1;overflow-y:auto;padding:22px}
.pg{display:none}
.pg.on{display:block}
.pg-hd{margin-bottom:22px;display:flex;align-items:flex-start;justify-content:space-between;gap:16px;flex-wrap:wrap}
.pg-t{font-family:var(--font-h);font-size:21px;font-weight:800;letter-spacing:-.3px;margin-bottom:3px}
.pg-d{font-size:12px;color:var(--t2)}
.pg-actions{display:flex;gap:8px;flex-wrap:wrap;flex-shrink:0}

/* ══════════════════════════ GRID ════════════════════════════ */
.g2{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.g5{display:grid;grid-template-columns:repeat(5,1fr);gap:12px}

/* ══════════════════════════ CARDS ══════════════════════════ */
.card{background:var(--s1);border:1px solid var(--border);border-radius:var(--rl);padding:18px}
.ch{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;gap:8px}
.ct{font-family:var(--font-m);font-size:10px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:1px}
.stat{background:var(--s1);border:1px solid var(--border);border-radius:var(--rl);padding:18px 16px;position:relative;overflow:hidden;transition:border-color .15s}
.stat:hover{border-color:var(--border3)}
.stat.hi{border-color:rgba(200,255,0,.25);background:var(--lime-a10)}
.stat-v{font-family:var(--font-h);font-size:34px;font-weight:800;line-height:1;margin-bottom:5px;letter-spacing:-1px}
.stat-l{font-size:11px;color:var(--t2);font-weight:500;letter-spacing:.2px}
.stat-ch{font-family:var(--font-m);font-size:10px;margin-top:7px}
.stat-ch.up{color:var(--green)} .stat-ch.dn{color:var(--red)}
.stat-ico{position:absolute;right:14px;top:50%;transform:translateY(-50%);font-size:26px;opacity:.12}

/* ══════════════════════════ TABLE ═══════════════════════════ */
.tw{overflow-x:auto;border:1px solid var(--border);border-radius:var(--rl)}
.dt{width:100%;border-collapse:collapse}
.dt th{background:var(--s2);padding:10px 13px;text-align:left;font-family:var(--font-m);font-size:9.5px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:1px;border-bottom:1px solid var(--border);white-space:nowrap}
.dt td{padding:11px 13px;border-bottom:1px solid var(--border);font-size:12.5px;vertical-align:middle}
.dt tr:last-child td{border-bottom:none}
.dt tbody tr:hover{background:var(--s2)}
.dt th:first-child,.dt td:first-child{padding-left:18px}
.tt{display:flex;align-items:center;gap:10px;margin-bottom:12px;flex-wrap:wrap}
.si{background:var(--s2);border:1px solid var(--border);border-radius:var(--r);padding:7px 11px;color:var(--text);font-size:12px;outline:none;transition:border-color .15s}
.si:focus{border-color:var(--lime)}
.pag{display:flex;align-items:center;gap:6px;margin-top:12px;font-family:var(--font-m);font-size:11px;color:var(--t2)}
.pb{width:26px;height:26px;border-radius:5px;background:var(--s2);border:1px solid var(--border);color:var(--text);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:11px;transition:all .15s}
.pb:hover,.pb.on{background:var(--lime);border-color:var(--lime);color:#000;font-weight:700}
.pb:disabled{opacity:.3;cursor:not-allowed}

/* ══════════════════════════ BADGES ═════════════════════════ */
.b{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:10.5px;font-weight:600;font-family:var(--font-m);letter-spacing:.2px;white-space:nowrap}
.bg{background:var(--green-a);color:var(--green);border:1px solid rgba(0,217,126,.2)}
.br{background:var(--red-a);color:var(--red);border:1px solid rgba(255,68,85,.2)}
.bo{background:var(--orange-a);color:var(--orange);border:1px solid rgba(255,149,0,.2)}
.bb{background:var(--blue-a);color:var(--blue);border:1px solid rgba(77,159,255,.2)}
.bp{background:var(--purple-a);color:var(--purple);border:1px solid rgba(176,136,255,.2)}
.bl{background:var(--lime-a18);color:var(--lime);border:1px solid rgba(200,255,0,.25)}
.bk{background:rgba(100,100,100,.12);color:var(--t2);border:1px solid var(--border2)}

/* ══════════════════════════ BUTTONS ════════════════════════ */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 15px;border-radius:var(--r);border:none;cursor:pointer;font-size:12.5px;font-weight:600;transition:all .15s;font-family:var(--font-b);white-space:nowrap}
.btn-l{background:var(--lime);color:#000}.btn-l:hover{background:var(--lime2);transform:translateY(-1px)}
.btn-g{background:transparent;border:1px solid var(--border2);color:var(--t2)}.btn-g:hover{border-color:var(--lime);color:var(--lime)}
.btn-r{background:var(--red-a);border:1px solid rgba(255,68,85,.25);color:var(--red)}.btn-r:hover{background:rgba(255,68,85,.25)}
.btn-ok{background:var(--green-a);border:1px solid rgba(0,217,126,.25);color:var(--green)}.btn-ok:hover{background:rgba(0,217,126,.25)}
.btn-s{padding:5px 11px;font-size:11px}
.bic{width:30px;height:30px;padding:0;border-radius:var(--r);border:1px solid var(--border);background:var(--s2);color:var(--t2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;transition:all .15s}
.bic:hover{border-color:var(--lime);color:var(--lime)}

/* ══════════════════════════ MODAL ═══════════════════════════ */

.mh{display:flex;align-items:center;justify-content:space-between;padding:20px 22px 0}

/* ══════════════════════════ TABS ════════════════════════════ */
.tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:18px;gap:0;overflow-x:auto}
.tab{padding:9px 16px;font-size:12.5px;font-weight:500;color:var(--t3);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap}

.tp{display:none}

#toasts{position:fixed;bottom:20px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:6px}
.toast{background:var(--s1);border:1px solid var(--border2);border-radius:var(--r);padding:11px 14px;font-size:12px;min-width:240px;animation:tIn .25s ease;display:flex;align-items:center;gap:8px;box-shadow:var(--sh)}

.monitor-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(152px,1fr));gap:8px}
.mon-card{background:var(--s2);border:1px solid var(--border);border-radius:var(--r);padding:13px;text-align:center;transition:border-color .2s;cursor:default}

.mon-name{font-size:11.5px;font-weight:600;margin-bottom:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mon-dept{font-size:10px;color:var(--t3);margin-bottom:5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

.pulse-dot{width:5px;height:5px;border-radius:50%}
.pulse-dot.g{background:var(--green);box-shadow:0 0 5px var(--green)}
.pulse-dot.o{background:var(--orange)}
.pulse-dot.k{background:var(--t4)}
.mon-time{font-family:var(--font-m);font-size:9px;color:var(--t4);margin-top:3px}

/* ══════════════════════════ ACTIVITY ════════════════════════ */
.act-item{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)}
.act-item:last-child{border-bottom:none}
.act-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-top:4px}
.act-dot.g{background:var(--green)} .act-dot.r{background:var(--red)} .act-dot.o{background:var(--orange)} .act-dot.b{background:var(--blue)}
.act-c{flex:1}
.act-t{font-size:12.5px;font-weight:500;margin-bottom:1px}
.act-ts{font-family:var(--font-m);font-size:10px;color:var(--t4)}

/* ══════════════════════════ CHART ═══════════════════════════ */

.kb-cnt { padding: 10px; flex: 1; min-height: 100px; }
.kb-card { background: var(--s1); border: 1px solid var(--border); border-radius: 8px; padding: 12px; margin-bottom: 10px; cursor: grab; transition: transform 0.1s, box-shadow 0.1s; position: relative; }

.clock-wgt{background:var(--s1);border:1px solid var(--border);border-radius:var(--rl);padding:22px;text-align:center}

/* ══════════════════════════ MESSAGES ═══════════════════════ */

.conv-info{flex:1;overflow:hidden}

.msg-b.sent{background:var(--lime-a18);border:1px solid rgba(200,255,0,.18);align-self:flex-end}
.msg-b.recv{background:var(--s2);border:1px solid var(--border);align-self:flex-start}
.msg-ts{font-family:var(--font-m);font-size:9px;color:var(--t4);margin-top:3px;text-align:right}
.chat-inp{border-top:1px solid var(--border);padding:12px;display:flex;gap:8px;background:var(--s1)}
.chat-input{flex:1;background:var(--s2);border:1px solid var(--border2);border-radius:var(--r);padding:9px 12px;color:var(--text);outline:none;font-size:12.5px;transition:border-color .15s}

/* ══════════════════════════ PROFILE ════════════════════════ */
.prof-hero{background:var(--s1);border:1px solid var(--border);border-radius:var(--rl);padding:24px;display:flex;align-items:center;gap:20px;margin-bottom:18px}
.prof-av{width:72px;height:72px;border-radius:50%;background:var(--lime-a10);border:2px solid rgba(200,255,0,.4);display:flex;align-items:center;justify-content:center;font-family:var(--font-h);font-size:26px;font-weight:800;color:var(--lime);flex-shrink:0;overflow:hidden}
.prof-av img{width:100%;height:100%;object-fit:cover}

/* ══════════════════ ACCESS REQUEST CARD ════════════════════ */
.req-card{background:var(--s2);border:1px solid rgba(200,255,0,.15);border-radius:var(--r);padding:14px;display:flex;align-items:center;gap:12px;margin-bottom:10px}
.req-av{width:38px;height:38px;border-radius:50%;background:var(--lime-a10);display:flex;align-items:center;justify-content:center;font-family:var(--font-h);font-size:14px;font-weight:700;color:var(--lime);flex-shrink:0}
.req-info{flex:1}
.req-name{font-size:13px;font-weight:600;margin-bottom:2px}
.req-meta{font-size:11px;color:var(--t2)}
.req-acts{display:flex;gap:7px}

/* ══════════════════════════ TOGGLE ═════════════════════════ */
.tog{width:36px;height:20px;border-radius:10px;background:var(--border2);border:none;cursor:pointer;position:relative;transition:background .15s;flex-shrink:0}
.tog.on{background:var(--lime)}
.tog::after{content:'';position:absolute;width:14px;height:14px;border-radius:50%;background:#fff;top:3px;left:3px;transition:left .15s}
.tog.on::after{left:19px}

.rank-i{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)}
.rank-i:last-child{border-bottom:none}
.rank-n{font-family:var(--font-m);font-size:11px;color:var(--t4);width:22px;text-align:center;flex-shrink:0}

.rank-av{width:32px;height:32px;border-radius:50%;background:var(--lime-a10);display:flex;align-items:center;justify-content:center;font-family:var(--font-h);font-size:12px;font-weight:700;color:var(--lime);flex-shrink:0}
.rank-inf{flex:1}
.rank-nm{font-size:12.5px;font-weight:600;margin-bottom:1px}
.rank-dp{font-size:10px;color:var(--t3)}
.rank-sc{font-family:var(--font-h);font-size:14px;font-weight:800;color:var(--lime)}

async function saveQuickTask(){
  const title=document.getElementById('qt-ti')?.value?.trim();
  if(!title){toast('Task title is required','er');return}
  const type=document.getElementById('qt-tp')?.value||'daily';
  const priority=document.getElementById('qt-pr')?.value||'Medium';
  const assignTo=document.getElementById('qt-as')?.value||null;
  const dt=document.getElementById('qt-dt')?.value||null;
  const dl=document.getElementById('qt-dl')?.value||null;
  const desc=document.getElementById('qt-de')?.value||'';
  let error;
  if(type==='monthly'&&isAdmin()){
    const mo=parseInt(document.getElementById('qt-mo')?.value)||new Date().getMonth()+1;
    const yr=parseInt(document.getElementById('qt-yr')?.value)||new Date().getFullYear();
    ({error}=await db.from('monthly_tasks').insert({title,description:desc,priority,assigned_to:assignTo,month:mo,year:yr,deadline_time:dl,task_type:'monthly'}));
  } else if(type==='personal'){
    ({error}=await db.from('tasks').insert({title,description:desc,priority,assigned_to:U.id,task_type:'personal',specific_date:dt,deadline_time:dl,admin_assessment:'pending'}));
  } else {
    ({error}=await db.from('tasks').insert({title,description:desc,priority,assigned_to:isAdmin()?(assignTo||null):U.id,task_type:type,specific_date:dt,deadline_time:dl,admin_assessment:'pending'}));
  }
  if(error){toast('Failed: '+error.message,'er');return}
  toast('Task created!','ok');cModal();
  // Refresh current page if on tasks
  if(PAGE==='a-tasks')pgAdminTasks($('pg-wrap'));
  if(PAGE==='e-tasks')pgEmpTasks($('pg-wrap'));
}

/* ─── UTILS ──────────────────────────────────────── */
const $=id=>document.getElementById(id);
const fmt=ts=>{if(!ts)return'—';return new Date(typeof ts==='number'?ts:ts).toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'})};
const fmtT=ts=>{if(!ts)return'—';return new Date(typeof ts==='number'?ts:ts).toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'})};
const fmtDT=ts=>{if(!ts)return'—';const d=new Date(typeof ts==='number'?ts:ts);return d.toLocaleDateString('en-IN',{day:'2-digit',month:'short'})+' '+d.toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'})};
const ini=n=>{if(!n)return'?';return n.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2)};
function normType(t){
  if(!t)return'';
  let s=t.includes('.')?t.split('.').pop():t;
  s=s.toLowerCase().replace(/_([a-z])/g,(m,c)=>c.toUpperCase());
  if(s==='clockin')return'clockIn'; if(s==='clockout')return'clockOut';
  if(s==='breakstart')return'breakStart'; if(s==='breakend')return'breakEnd';
  return s;
}
function toast(msg,type='in'){
  const c=$('toasts'),t=document.createElement('div');
  const ico={ok:'✓',er:'✕',in:'ℹ'};
  t.className=`toast ${type}`;t.innerHTML=`<span style="opacity:.6">${ico[type]||'·'}</span><span>${msg}</span>`;
  c.appendChild(t);setTimeout(()=>t.remove(),3200);
}
function ld(el){el.innerHTML=`<div class="ld"><div class="spin"></div><span>Loading…</span></div>`}
function empty(el,msg='Nothing here',ico='📭'){el.innerHTML=`<div class="empty"><div class="empty-i">${ico}</div><div class="empty-t">${msg}</div></div>`}
const chartOpts=()=>{const tc=IS_DARK?'#666':'#9ca3af';const gc=IS_DARK?'rgba(255,255,255,.04)':'rgba(0,0,0,.06)';return{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:IS_DARK?'#888':'#6b7280',font:{size:10},padding:10}}},scales:{x:{ticks:{color:tc,font:{size:10}},grid:{color:gc}},y:{ticks:{color:tc,font:{size:10}},grid:{color:gc},beginAtZero:true}}}}

function greet(){const h=new Date().getHours();return h<12?'morning':h<17?'afternoon':'evening'}
async function loadAdminDash(){
  const today=new Date();today.setHours(0,0,0,0);
  const[{data:att},{data:profs}]=await Promise.all([
    db.from('attendance_records').select('*').gte('timestamp',today.getTime()),
    db.from('profiles').select('*')
  ]);
  const latestStatus={};
  (att||[]).sort((a,b)=>a.timestamp-b.timestamp).forEach(r=>{latestStatus[r.user_id]=r});
  const online=Object.values(latestStatus).filter(r=>{const t=normType(r.type);return t==='clockIn'||t==='breakEnd'}).length;
  const onBreak=Object.values(latestStatus).filter(r=>normType(r.type)==='breakStart').length;
  const total=profs?.length||0;
  const pendingAccess=(profs||[]).filter(p=>p.status==='pending').length;
  const el=$('adash-stats');
  if(el)el.innerHTML=`
    <div class="stat hi"><div class="stat-v" style="color:var(--lime)">${total}</div><div class="stat-l">Total Staff</div><div class="stat-ico">👥</div></div>
    <div class="stat"><div class="stat-v" style="color:var(--green)">${online}</div><div class="stat-l">Online Now</div><div class="stat-ico">🟢</div></div>
    <div class="stat"><div class="stat-v" style="color:var(--orange)">${onBreak}</div><div class="stat-l">On Break</div><div class="stat-ico">☕</div></div>
    <div class="stat"><div class="stat-v" style="color:var(--t2)">${total-online-onBreak}</div><div class="stat-l">Offline</div><div class="stat-ico">⭘</div></div>
    <div class="stat ${pendingAccess?'hi':''}"><div class="stat-v" style="color:${pendingAccess?'var(--orange)':'var(--t2)'}">${pendingAccess}</div><div class="stat-l">Pending Access</div><div class="stat-ico">🔐</div></div>`;

  // Live grid
  const lg=$('adash-live');
  if(lg&&profs){
    const pm={}; (profs||[]).forEach(p=>pm[p.id]=p);
    lg.innerHTML=(profs||[]).slice(0,16).map(p=>{
      const r=latestStatus[p.id];
      const nt=normType(r?.type);
      const st=nt==='clockIn'||nt==='breakEnd'?'online':nt==='breakStart'?'break':'offline';
      const lbl={'online':'ONLINE','break':'BREAK','offline':'OFFLINE'}[st];
      const dc={'online':'g','break':'o','offline':'k'}[st];
      const lastTime=r?fmtT(r.timestamp):'';
      return`<div class="mon-card ${st}">

        ${lastTime?`<div class="mon-time">${lastTime}</div>`:''}
      </div>`;
    }).join('');
    $('live-cnt').textContent=`● ${online} Online`;
  }

  // Feed
  const feed=$('adash-feed');
  if(feed){
    const recent=(att||[]).sort((a,b)=>b.timestamp-a.timestamp).slice(0,12);
    const pm={}; (profs||[]).forEach(p=>pm[p.id]=p);
    const ti={clockIn:{d:'g',l:'Clocked In'},clockOut:{d:'r',l:'Clocked Out'},breakStart:{d:'o',l:'Break'},breakEnd:{d:'b',l:'Resumed'}};
    if(!recent.length){empty(feed,'No activity today','📋');return}
    feed.innerHTML=recent.map(r=>{
      const q=ti[normType(r.type)]||{d:'k',l:r.type};

      </div></div>`;
    }).join('');
  }


  // Donut
  const ctx=document.getElementById('adash-donut');
  if(ctx)new Chart(ctx,{type:'doughnut',data:{labels:['Online','Break','Offline'],datasets:[{data:[online,onBreak,total-online-onBreak],backgroundColor:[IS_DARK?'rgba(0,217,126,.75)':'rgba(22,163,74,.75)',IS_DARK?'rgba(255,149,0,.75)':'rgba(234,88,12,.75)',IS_DARK?'rgba(50,50,50,.75)':'rgba(200,200,200,.75)'],borderWidth:0}]},options:{responsive:true,maintainAspectRatio:false,cutout:'72%',plugins:{legend:{position:'bottom',labels:{color:IS_DARK?'#888':'#6b7280',font:{size:10},padding:14}}}}});
}

  const mm = {}; (m||[]).forEach(x=>mm[x.id]=x);

  const allTasks=[];
  (mt||[]).forEach(t=>allTasks.push({...t,type:'Monthly',title:mm[t.monthly_task_id]?.title, profiles: pm[t.user_id], deadline:t.deadline_time || null}));
  (d||[]).forEach(t=>allTasks.push({...t,type:'TASK', profiles: pm[t.user_id], deadline:t.end_time || null}));

  const renderKanban=(search='')=>{
    const s=search.toLowerCase();
    const tasks = allTasks.filter(t=> !s || ((t.title||'')+(t.profiles?.name||'')).toLowerCase().includes(s));

    const cols = {
      todo: {t:'To Do', c:'bk', items:[]},
      progress: {t:'In Progress', c:'blue', items:[]},
      review: {t:'Review', c:'orange', items:[]},
      done: {t:'Done', c:'green', items:[]},
      trash: {t:'🗑 Trash', c:'red', items:[]}
    };

    tasks.forEach(t=>{
      if(t.is_archived) cols.trash.items.push(t);
      else if(t.admin_assessment==='accepted'||t.status==='Completed') cols.done.items.push(t);
      else if(t.admin_assessment==='Review'||t.status==='Review') cols.review.items.push(t);
      else if(t.status==='In Progress' || t.admin_assessment==='pending review') cols.progress.items.push(t);
      else cols.todo.items.push(t);
    });

    const board = document.getElementById('kanban-board');
    if(!board)return;
    board.innerHTML = Object.entries(cols).map(([id, col])=>`
      <div class="kb-col ${id==='trash'?'trash':''}" ondragover="event.preventDefault(); this.classList.add('kb-drop-over')" ondragleave="this.classList.remove('kb-drop-over')" ondrop="handleKbDrop(event, '${id}')">
        <div class="kb-h"><span>${col.t}</span><span class="b ${col.c}">${col.items.length}</span></div>
        <div class="kb-cnt" id="col-${id}">
          ${col.items.map(x=>{
            const isOverdue = x.deadline && new Date().toTimeString() > x.deadline && x.status!=='Completed' && x.admin_assessment!=='accepted';
            return `<div class="kb-card" draggable="true" ondragstart="handleKbDragStart(event, '${x.id}', '${x.type}')" id="card-${x.id}">
              <div class="kb-title">${x.title || 'Untitled'}</div>
              <div class="kb-meta">
                <span class="kb-tag bl">${x.type}</span>
                <span>👤 ${x.profiles?.name || 'Everyone'}</span>
                ${x.deadline ? `<span style="color:${isOverdue?'var(--red)':'var(--t3)'}">⏰ ${x.deadline}</span>` : ''}
                ${id==='trash' ? `<button class="btn btn-g btn-s" style="margin-top:8px" onclick="restoreTask('${x.id}', '${x.type}')">Restore</button>` : ''}
              </div>
            </div>`;
          }).join('')}
        </div>
      </div>`).join('');
  };

  panel.innerHTML=`
    <div style="margin-bottom:15px;display:flex;gap:10px;position:sticky;top:0;background:var(--bg);z-index:5;padding:5px 0">
      <input type="text" class="si" placeholder="Search Kanban..." style="flex:1" oninput="loadTracker.render(this.value)" id="tracker-search">
    </div>
    <div class="kanban-board" id="kanban-board"></div>`;
  loadTracker.render = renderKanban;
  renderKanban();
}

let kbDragging={id:null,type:null};
function handleKbDragStart(e, id, type){
  kbDragging={id, type};
  e.dataTransfer.setData('text/plain', id);
  e.target.classList.add('dragging');
}
async function restoreTask(id, type){
  const table = type==='Monthly' ? 'user_monthly_tasks' : 'tasks';
  const updateData = type==='Monthly' 
    ? { is_archived: false, status: 'Pending' }
    : { is_archived: false, admin_assessment: 'pending' };

  toast('Restoring task...','in');
  const {error} = await db.from(table).update(updateData).eq('id', id);
  if(error){toast('Error: '+error.message,'er');return}
  toast('Task restored','ok'); loadTracker($('tp-tracker'));
}
async function handleKbDrop(e, colId){
  e.preventDefault();
  const el = e.currentTarget; el.classList.remove('kb-drop-over');
  const {id, type} = kbDragging; if(!id) return;
  
  const statusMap = {
    todo: { status: 'Pending', assessment: 'pending' },
    progress: { status: 'In Progress', assessment: 'pending review' },
    review: { status: 'Review', assessment: 'Review' },
    done: { status: 'Completed', assessment: 'accepted' },
    trash: { archived: true }
  };
  
  const target = statusMap[colId];
  const table = type==='Monthly' ? 'user_monthly_tasks' : 'tasks';
  
  let updateData = {};
  if(target.archived){
    updateData = { is_archived: true };
  } else {
    // We update status for BOTH just to be safe and consistent, 
    // though the 'status' column error on 'tasks' suggest we should only update what exists.
    // Based on the error "Could not find status column of tasks", I will only update status for Monthly.
    updateData = type==='Monthly' 
      ? { status: target.status, is_archived: false } 
      : { admin_assessment: target.assessment, is_archived: false };
    
    if(target.status==='Completed') updateData.completed_at = new Date().toISOString();
  }

  toast('Updating status...','in');
  const {error} = await db.from(table).update(updateData).eq('id', id);
  if(error) { toast('Error: '+error.message, 'er'); return; }
  
  toast(target.archived ? 'Task archived' : 'Task moved to '+colId, 'ok');
  loadTracker($('tp-tracker'));
}

async function deleteTask(id,table){

function swTab(el,pid){
  el.closest('.tabs').querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));el.classList.add('on');
  const con=el.closest('.tabs').parentElement;con.querySelectorAll(':scope>.tp').forEach(p=>p.classList.remove('on'));
  const panel=$(pid);if(panel){panel.classList.add('on');
    if(!panel.innerHTML.trim()||panel.querySelector('.spin')){
      if(pid==='tp-daily')loadTaskPanel('daily');
      else if(pid==='tp-hourly')loadTaskPanel('hourly');
      else if(pid==='tp-tracker')loadTaskPanel('tracker');
      else if(pid==='tp-review')loadTaskPanel('review');
    }
  }
}

async function loadPerf(){
  const[{data:profs},{data:att}]=await Promise.all([
    db.from('profiles').select('*'),
    db.from('attendance_records').select('user_id,timestamp,type').order('timestamp',{ascending:false})
  ]);
  const medals=['🥇','🥈','🥉'];
  const renderBoard=(arr,key)=>arr.slice(0,10).map((p,i)=>`<div class="rank-i">
    <div class="rank-n ${i===0?'g':''}">${medals[i]||i+1}</div>
    <div class="rank-av">${ini(p.name||p.email)}</div>
    <div class="rank-inf"><div class="rank-nm">${p.name||p.email}</div><div class="rank-dp">${p.department||'—'}</div></div>
    <div class="rank-sc">${p[key]||0}</div>
  </div>`).join('');
  const byTasks=[...profs||[]].sort((a,b)=>(b.tasks_completed||0)-(a.tasks_completed||0));
  const byPts=[...profs||[]].sort((a,b)=>(b.points||0)-(a.points||0));
  $('rank-tasks').innerHTML=renderBoard(byTasks,'tasks_completed');
  $('rank-pts').innerHTML=renderBoard(byPts,'points');
  // Streaks
  const sm={};(att||[]).forEach(r=>{if(!sm[r.user_id])sm[r.user_id]=[];sm[r.user_id].push(r)});
  const pm={};(profs||[]).forEach(p=>pm[p.id]=p);
  const streaks=Object.entries(sm).map(([uid,recs])=>({uid,s:calcStreak(recs)})).sort((a,b)=>b.s-a.s);
  $('rank-streak').innerHTML=`<div class="tw"><table class="dt"><thead><tr><th>Rank</th><th>Employee</th><th>Department</th><th>Current Streak</th><th>Progress</th></tr></thead><tbody>${streaks.slice(0,10).map((x,i)=>{
    const p=pm[x.uid];
    return`<tr>
      <td><span style="font-family:var(--font-m)">${medals[i]||i+1}</span></td>
      <td><div style="font-weight:600">${p?.name||'Unknown'}</div></td>
      <td style="color:var(--t2)">${p?.department||'—'}</td>
      <td><span style="font-family:var(--font-h);font-size:18px;font-weight:800;color:var(--lime)">${x.s}</span><span style="color:var(--t3);font-size:11px"> days</span></td>
      <td style="min-width:120px"><div class="progress-bar"><div class="progress-fill" style="width:${Math.min(100,(x.s/30)*100)}%"></div></div></td>
    </tr>`;
  }).join('')}</tbody></table></div>`;
}
function calcStreak(recs){
  const days=new Set(recs.filter(r=>r.type==='clockIn').map(r=>new Date(r.timestamp).toDateString()));
  let streak=0;const today=new Date();
  for(let i=0;i<60;i++){const d=new Date(today);d.setDate(d.getDate()-i);if(days.has(d.toDateString()))streak++;else break}
  return streak;
}

async function buildInsightCharts(){

    db.from('profiles').select('department')
  ]);
  const co=chartOpts();
  // Attendance trend
  const days={};for(let i=29;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);days[d.toDateString()]=0}
  (att||[]).filter(r=>r.type==='clockIn').forEach(r=>{const k=new Date(r.timestamp).toDateString();if(k in days)days[k]++});
  const labels=Object.keys(days).map(d=>{const dd=new Date(d);return`${dd.getMonth()+1}/${dd.getDate()}`});
  new Chart(document.getElementById('att-trend'),{type:'line',data:{labels,datasets:[{label:'Clock-ins',data:Object.values(days),borderColor:IS_DARK?'#C8FF00':'#5c8500',backgroundColor:IS_DARK?'rgba(200,255,0,.07)':'rgba(92,133,0,.07)',tension:.4,pointRadius:0,borderWidth:2}]},options:{...co,plugins:{legend:{display:false}}}});
  // Task status
  const ts={Completed:0,'In Progress':0,Pending:0,'On Hold':0};
  (tasks||[]).forEach(t=>{if(t.status in ts)ts[t.status]++});
  new Chart(document.getElementById('task-stat'),{type:'bar',data:{labels:Object.keys(ts),datasets:[{data:Object.values(ts),backgroundColor:[IS_DARK?'rgba(0,217,126,.7)':'rgba(22,163,74,.7)',IS_DARK?'rgba(77,159,255,.7)':'rgba(37,99,235,.7)',IS_DARK?'rgba(255,149,0,.7)':'rgba(234,88,12,.7)',IS_DARK?'rgba(80,80,80,.7)':'rgba(180,180,180,.7)'],borderWidth:0,borderRadius:5}]},options:{...co,plugins:{legend:{display:false}}}});
  // Leave types
  const lt={};(leaves||[]).filter(l=>l.status==='Approved').forEach(l=>{const k=l.leave_type||'Other';lt[k]=(lt[k]||0)+1});
  const lc=IS_DARK?['rgba(200,255,0,.75)','rgba(77,159,255,.75)','rgba(255,149,0,.75)','rgba(176,136,255,.75)']:['rgba(92,133,0,.75)','rgba(37,99,235,.75)','rgba(234,88,12,.75)','rgba(124,58,237,.75)'];
  const lgColor=IS_DARK?'#888':'#6b7280';
  new Chart(document.getElementById('leave-tp'),{type:'doughnut',data:{labels:Object.keys(lt),datasets:[{data:Object.values(lt),backgroundColor:lc,borderWidth:0}]},options:{responsive:true,maintainAspectRatio:false,cutout:'60%',plugins:{legend:{position:'bottom',labels:{color:lgColor,font:{size:10},padding:10}}}}});
  // Dept dist
  const dd={};(profs||[]).forEach(p=>{const k=p.department||'Other';dd[k]=(dd[k]||0)+1});
  new Chart(document.getElementById('dept-dist'),{type:'pie',data:{labels:Object.keys(dd),datasets:[{data:Object.values(dd),backgroundColor:lc,borderWidth:0}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{color:lgColor,font:{size:10},padding:10}}}}});
  // Hourly
  const hh=new Array(24).fill(0);(att||[]).filter(r=>r.type==='clockIn').forEach(r=>hh[new Date(r.timestamp).getHours()]++);
  new Chart(document.getElementById('hourly-att'),{type:'bar',data:{labels:Array.from({length:24},(_,i)=>`${i}:00`),datasets:[{data:hh,backgroundColor:IS_DARK?'rgba(200,255,0,.5)':'rgba(92,133,0,.5)',borderWidth:0,borderRadius:3}]},options:{...co,plugins:{legend:{display:false}}}});
}

async function loadConvList(){
  const el=$('conv-list-inner');if(!el)return;
  let partners=PROFILES.filter(p=>p.id!==U.id);
  if(!partners.length){empty(el,'No team members','👥');return}
  // Get unread counts
  const{data:msgs}=await db.from('messages').select('sender_id,recipient_id,read').or(`sender_id.eq.${U.id},recipient_id.eq.${U.id}`);
  const unreadByPartner={};
  (msgs||[]).filter(m=>m.recipient_id===U.id&&!m.read).forEach(m=>{unreadByPartner[m.sender_id]=(unreadByPartner[m.sender_id]||0)+1});
  el.innerHTML=partners.map(p=>`<div class="conv-i ${activeConvId===p.id?'on':''}" onclick="openConv('${p.id}')">
    <div class="conv-av">${ini(p.name||p.email)}</div>
    <div class="conv-info">
      <div class="conv-name">${p.name||p.email}</div>
      <div class="conv-prev">${p.department||p.role||'—'}</div>
    </div>
    ${unreadByPartner[p.id]?`<span class="conv-unrd">${unreadByPartner[p.id]}</span>`:''}
  </div>`).join('');
}
async function openConv(pid){
  activeConvId=pid;
  const partner=PROFILES.find(p=>p.id===pid);
  const hdr=$('chat-hdr');const inp=$('chat-inp');const msgs=$('chat-msgs');
  if(hdr)hdr.innerHTML=`<div class="conv-av" style="width:32px;height:32px;font-size:12px">${ini(partner?.name||partner?.email||'?')}</div><div><div style="font-weight:600;font-size:13px">${partner?.name||partner?.email||'Unknown'}</div><div style="font-size:10px;color:var(--t3)">${partner?.department||partner?.role||'—'}</div></div>`;
  if(inp)inp.style.display='flex';
  await db.from('messages').update({read:true}).eq('recipient_id',U.id).eq('sender_id',pid);
  const{data}=await db.from('messages').select('*').or(`and(sender_id.eq.${U.id},recipient_id.eq.${pid}),and(sender_id.eq.${pid},recipient_id.eq.${U.id})`).order('created_at',{ascending:true});
  if(msgs){
    msgs.innerHTML=(data||[]).length===0?`<div class="empty" style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center"><div class="empty-i">👋</div><div class="empty-t">Say hello!</div></div>`:
      (data||[]).map(m=>{const mine=m.sender_id===U.id;return`<div style="${mine?'align-self:flex-end':''}"><div class="msg-b ${mine?'sent':'recv'}">${m.message}</div><div class="msg-ts">${fmtT(m.created_at)}</div></div>`}).join('');
    msgs.scrollTop=msgs.scrollHeight;
  }
  loadConvList();loadUnread();
}
async function sendMsg(){
  const inp=$('msg-inp');if(!inp||!activeConvId)return;
  const txt=inp.value.trim();if(!txt)return;inp.value='';
  const{error}=await db.from('messages').insert({sender_id:U.id,recipient_id:activeConvId,message:txt,read:false});
  if(error){toast('Send failed','er');return}
  openConv(activeConvId);

async function loadEmpAtt(){
  const{data:recs}=await db.from('attendance_records').select('*').eq('user_id',U.id).order('timestamp',{ascending:false});
  const all=recs||[];
  const today=new Date();today.setHours(0,0,0,0);
  const mStart=new Date(today.getFullYear(),today.getMonth(),1).getTime();
  const mRecs=all.filter(r=>r.timestamp>=mStart);
  const daysPresent=new Set(mRecs.filter(r=>r.type==='clockIn').map(r=>new Date(r.timestamp).toDateString())).size;
  const totalH=calcHours(mRecs);
  const stEl=$('eatt-stats');
  if(stEl)stEl.innerHTML=`
    <div class="stat hi"><div class="stat-v" style="color:var(--lime)">${daysPresent}</div><div class="stat-l">Days Present</div></div>
    <div class="stat"><div class="stat-v" style="color:var(--green)">${totalH.toFixed(1)}</div><div class="stat-l">Hours This Month</div></div>
    <div class="stat"><div class="stat-v">${daysPresent>0?(totalH/daysPresent).toFixed(1):'0'}</div><div class="stat-l">Avg Hours/Day</div></div>
    <div class="stat"><div class="stat-v" style="color:var(--blue)">${calcStreak(all)}</div><div class="stat-l">Day Streak</div></div>`;
  renderCal(all);
  const rr=$('eatt-recs');
  if(rr){
    const tb={clockIn:'bg',clockOut:'br',breakStart:'bo',breakEnd:'bb'};
    rr.innerHTML=all.slice(0,20).map(r=>`<div class="act-item"><div class="act-dot ${r.type==='clockIn'?'g':r.type==='clockOut'?'r':r.type==='breakStart'?'o':'b'}"></div><div class="act-c"><div class="act-t"><span class="b ${tb[r.type]||'bk'}">${r.type}</span>${r.mood?` <span style="font-family:var(--font-m);font-size:10px;color:var(--lime)">Mood ${r.mood}/5</span>`:''}</div><div class="act-ts">${fmtDT(r.timestamp)}</div></div></div>`).join('')||`<div class="empty"><div class="empty-t">No records yet</div></div>`;
  }
}
function calcHours(recs){
  let t=0;let last=null;const s=[...recs].sort((a,b)=>a.timestamp-b.timestamp);
  s.forEach(r=>{if(r.type==='clockIn'||r.type==='breakEnd')last=r.timestamp;else if((r.type==='clockOut'||r.type==='breakStart')&&last){t+=(r.timestamp-last)/3600000;last=null}});
  return t;
}
function renderCal(recs){
  const el=$('emp-cal');if(!el)return;
  const m=window.calM,y=window.calY;
  const lbl=$('cal-lbl');if(lbl)lbl.textContent=new Date(y,m).toLocaleDateString('en-IN',{month:'long',year:'numeric'});
  const firstDay=new Date(y,m,1).getDay();
  const daysInM=new Date(y,m+1,0).getDate();
  const pres=new Set(recs.filter(r=>r.type==='clockIn'&&new Date(r.timestamp).getMonth()===m&&new Date(r.timestamp).getFullYear()===y).map(r=>new Date(r.timestamp).getDate()));
  const today=new Date();
  let html=`<div class="cal-hdr">${['S','M','T','W','T','F','S'].map(d=>`<div class="cal-dn">${d}</div>`).join('')}</div><div class="cal-grid">`;
  for(let i=0;i<firstDay;i++)html+=`<div class="cal-cell emp"></div>`;
  for(let d=1;d<=daysInM;d++){
    const isT=d===today.getDate()&&m===today.getMonth()&&y===today.getFullYear();
    const isPast=new Date(y,m,d)<today&&!isT;
    const cls=isT?'today':pres.has(d)?'pres':isPast?'abs':'';
    html+=`<div class="cal-cell ${cls}">${d}</div>`;
  }
  html+=`</div><div style="display:flex;gap:10px;margin-top:10px;font-size:10px;color:var(--t3);flex-wrap:wrap">
    <span style="display:flex;align-items:center;gap:3px"><span style="width:9px;height:9px;border-radius:2px;background:rgba(0,217,126,.3);display:inline-block"></span>Present</span>
    <span style="display:flex;align-items:center;gap:3px"><span style="width:9px;height:9px;border-radius:2px;background:rgba(255,68,85,.12);display:inline-block"></span>Absent</span>
    <span style="display:flex;align-items:center;gap:3px"><span style="width:9px;height:9px;border-radius:2px;border:1px solid var(--lime);display:inline-block"></span>Today</span>
  </div>`;
  el.innerHTML=html;
}
function chMonth(delta){
  window.calM+=delta;
  if(window.calM>11){window.calM=0;window.calY++}
  if(window.calM<0){window.calM=11;window.calY--}
  db.from('attendance_records').select('*').eq('user_id',U.id).then(({data})=>renderCal(data||[]));
}

    <div class="act-c">
      <div class="act-t" style="display:flex;align-items:center;gap:7px">${r.leave_type}<span class="b ${sc[r.status]||'bk'}">${r.status}</span></div>
      <div class="act-ts">${fmt(r.start_date)} → ${fmt(r.end_date)}</div>
      ${r.admin_comment?`<div style="font-size:10px;color:var(--t3);margin-top:2px">${r.admin_comment}</div>`:''}
    </div>
  </div>`).join('');
}
async function applyLeave(){
  const req={user_id:U.id,leave_type:$('lt-tp').value,start_date:$('lt-fr').value,end_date:$('lt-to').value,reason:$('lt-rs').value,status:'Pending'};
  if(!req.start_date||!req.end_date){toast('Select dates','er');return}
  const{error}=await db.from('leave_requests').insert(req);
  if(error){toast('Failed: '+error.message,'er');return}
  toast('Leave request submitted!','ok');$('lt-fr').value='';$('lt-to').value='';$('lt-rs').value='';loadEmpLeaves();
}

/* ════════════════════════════════════════════════════
   PROFILE (shared)

async function pgProfile(c){
  const p=P;
  c.innerHTML=`
  <div class="prof-hero">
    <div class="prof-av">${p?.avatar_url?`<img src="${p.avatar_url}" alt="">`:ini(p?.name||p?.email||'?')}</div>
    <div>
      <div style="font-family:var(--font-h);font-size:22px;font-weight:800;margin-bottom:3px">${p?.name||'Your Name'}</div>
      <div style="font-family:var(--font-m);font-size:11px;color:var(--lime);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px">${ROLE} · ${p?.department||'—'}</div>
      <div style="display:flex;gap:6px;flex-wrap:wrap">
        ${p?.email?`<span class="b bk">✉ ${p.email}</span>`:''}
        ${p?.phone?`<span class="b bk">📱 ${p.phone}</span>`:''}
        ${p?.points!=null?`<span class="b bl">⭐ ${p.points} pts</span>`:''}
        ${p?.tasks_completed?`<span class="b bg">✓ ${p.tasks_completed} tasks</span>`:''}
      </div>
    </div>
  </div>
  <div class="g2">
    <div class="card">
      <div class="ch"><span class="ct">Edit Profile</span></div>
      <div class="fg"><label>Full Name</label><input id="pn" value="${p?.name||''}"></div>
      <div class="fg"><label>Phone</label><input id="pp" value="${p?.phone||''}"></div>
      <div class="fg"><label>Birthday</label><input type="date" id="pb" value="${p?.birthday||''}"></div>
      <div class="fg"><label>Bio</label><textarea id="pbi">${p?.bio||''}</textarea></div>
      <div class="fg"><label>Avatar URL</label><input type="url" id="pa" value="${p?.avatar_url||''}" placeholder="https://…"></div>
      <button class="btn btn-l" onclick="saveProfile()">Save Changes</button>
    </div>
    <div class="card">
      <div class="ch"><span class="ct">My Stats</span></div>
      <div class="kv"><span class="kv-l">Member Since</span><span class="kv-v">${fmt(p?.joining_date)}</span></div>
      <div class="kv"><span class="kv-l">Total Points</span><span class="kv-v" style="color:var(--lime)">${p?.points||0}</span></div>
      <div class="kv"><span class="kv-l">Tasks Completed</span><span class="kv-v">${p?.tasks_completed||0}</span></div>
      <div class="kv"><span class="kv-l">Department</span><span class="kv-v">${p?.department||'—'}</span></div>
      <div class="kv"><span class="kv-l">Status</span><span class="b ${p?.status==='active'?'bg':'bk'}">${p?.status||'active'}</span></div>
    </div>
  </div>`;
}
async function saveProfile(){
  const u={name:$('pn').value,phone:$('pp').value,birthday:$('pb').value||null,bio:$('pbi').value,avatar_url:$('pa').value};
  const{error}=await db.from('profiles').update(u).eq('id',U.id);
  if(error){toast('Failed: '+error.message,'er');return}
  P={...P,...u};toast('Profile saved','ok');updateSbUser();pgProfile($('pg-wrap'));
}
</script>
